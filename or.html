<!DOCTYPE html>
<html lang="om">
<head>
<meta charset="UTF-8">
<title>የባቡር እንቅስቃሴ ሁኔታ - NS & EW</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Roboto, 'Arial', sans-serif;
  background: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  gap: 30px;
  padding: 20px;
}

/* ===== BANNER ===== */
#welcomeBanner {
  width: 100%;
  max-width: 1000px;
  background: #F7AE05;
  border-radius: 50px;
  padding: 16px 24px;
  font-size: 1.6rem;
  color: white;
  text-align: center;
}

/* ===== STATUS BOX ===== */
.status-box {
  position: relative;
  background: white;
  border-radius: 30px;
  box-shadow: 0 20px 35px -10px rgba(0,30,40,0.3);
  width: 480px;
  max-width: 90vw;
  display: flex;
  flex-direction: column; /* ✅ IMPORTANT CHANGE */
  overflow: hidden;
}

/* ===== LABEL (NOW TOP) ===== */
.status-label {
  width: 100%;
  padding: 14px;
  font-weight: 700;
  text-align: center;
  font-size: 1.2rem;
  color: white;
}

/* NS color */
#trainNS .status-label {
  background: #0924ED;
}

/* EW color */
#trainEW .status-label {
  background: #05F714;
}

/* ===== MESSAGE BELOW ===== */
.status-message {
  padding: 22px;
  text-align: center;
  font-weight: 500;
}

/* STATUS COLORS */
.operating .status-message { color: #0f7b3a; }
.stopped .status-message { color: #c0392b; }
.finished .status-message { color: #1f618d; }
.returning .status-message { color: #d35400; }
.construction .status-message { color: #884ea0; }

/* RED DOT */
.status-dot {
  position: absolute;
  top: 10px;
  right: 15px;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: red;
}

/* MOBILE */
@media (max-width: 500px) {
  .status-box {
    width: 100%;
  }
}
</style>
</head>

<body>

<div id="welcomeBanner">
  Gara Geejjibaa Baabura Salphaa Finfinnee baga nagaan dhuftan
</div>

<!-- NS -->
<div class="status-box operating" id="trainNS">
  <div class="status-label">
    Daandii Kaabaa - Kibbaa
  </div>
  <div class="status-message" id="statusMsgNS">
    Haalli daandii NS fe’amaa jira...
  </div>
</div>

<!-- EW -->
<div class="status-box operating" id="trainEW">
  <div class="status-label">
    Daandii Bahaa - Dhihaa
  </div>
  <div class="status-message" id="statusMsgEW">
    Haalli daandii EW fe’amaa jira...
  </div>
</div>

<script>
const NS_JSON = "https://wesutdgames.github.io/status/ns.json";
const EW_JSON = "https://wesutdgames.github.io/status/ew.json";

async function updateNS() {
  const box = document.getElementById("trainNS");
  const msgEl = document.getElementById("statusMsgNS");

  try {
    const res = await fetch(NS_JSON + "?t=" + Date.now());
    const row = await res.json();

    let status = row?.status?.toLowerCase();
    let message = row?.or;

    if (!status || !message) {
      status = "operating";
      message = "🚆 Daandii Kaabaa - Kibbaa irratti baaburri tajaajila kennaa jira";
    }

    box.querySelector(".status-dot")?.remove();

    if (status === "stopped") {
      const dot = document.createElement("span");
      dot.className = "status-dot";
      box.appendChild(dot);
    }

    msgEl.textContent = message;
    box.className = "status-box " + status;

  } catch {
    msgEl.textContent = "❌📶 Mee Wi-Fi ykn data banaa";
    box.className = "status-box stopped";
  }
}

async function updateEW() {
  const box = document.getElementById("trainEW");
  const msgEl = document.getElementById("statusMsgEW");

  try {
    const res = await fetch(EW_JSON + "?t=" + Date.now());
    const row = await res.json();

    let status = row?.status?.toLowerCase();
    let message = row?.or;

    if (!status || !message) {
      status = "operating";
      message = "🚆 Daandii Bahaa - Dhihaa irratti baaburri tajaajila kennaa jira";
    }

    box.querySelector(".status-dot")?.remove();

    if (status === "stopped") {
      const dot = document.createElement("span");
      dot.className = "status-dot";
      box.appendChild(dot);
    }

    msgEl.textContent = message;
    box.className = "status-box " + status;

  } catch {
    msgEl.textContent = "❌📶 Mee Wi-Fi ykn data banaa";
    box.className = "status-box stopped";
  }
}

function updateAllLines(){
  updateNS();
  updateEW();
}

updateAllLines();
setInterval(updateAllLines, 60000);
</script>

</body>
</html>
