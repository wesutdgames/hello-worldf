<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hello World from GitHub JSON</title>
</head>
<body>
  <h1 id="hello-text">Loading...</h1>
  <p id="hello-time"></p>

  <script>
    const jsonURL = 'const jsonURL = 'https://raw.githubusercontent.com/wesutdgames/hello-world/main/data.json';';

    async function loadMessage() {
      try {
        const response = await fetch(jsonURL);
        if (!response.ok) throw new Error('Failed to fetch JSON');
        const data = await response.json();

        document.getElementById('hello-text').innerText = data.message;
        document.getElementById('hello-time').innerText = 'Updated at: ' + new Date(data.time).toLocaleString();
      } catch (err) {
        console.error(err);
        document.getElementById('hello-text').innerText = 'Error loading JSON';
      }
    }

    loadMessage();
    setInterval(loadMessage, 10000); // Optional: refresh every 10 sec
  </script>
</body>
</html>
